substitutions:
  _REGION: europe-west1
  _REPOSITORY: qa-metrics
  _BUGSNAG_SERVICE: bugsnag-ingest-function
  _JIRA_SERVICE: jira-ingest-function
  _TESTRAIL_SERVICE: testrail-ingest-function
  _GAMEBENCH_SERVICE: gamebench-ingest-function
  # IMPORTANT: validate these 3 values per target environment before each deploy.
  # DEV example:  _BQ_PROJECT=qa-panda-metrics-dev
  # PROD example: _BQ_PROJECT=qa-panda-metrics
  _BQ_PROJECT: qa-panda-metrics-dev
  _BQ_DATASET: qa_metrics_simple
  _BQ_LOCATION: EU
  _IMAGE_TAG: dev

steps:
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        echo "[preflight] PROJECT_ID=${PROJECT_ID}"
        echo "[preflight] _REGION=${_REGION}"
        echo "[preflight] _REPOSITORY=${_REPOSITORY}"

        project_number="$(gcloud projects describe "${PROJECT_ID}" --format='value(projectNumber)')"
        cb_sa="${project_number}@cloudbuild.gserviceaccount.com"
        echo "[preflight] Cloud Build service account esperado: ${cb_sa}"

        if ! gcloud artifacts repositories describe "${_REPOSITORY}" \
          --location="${_REGION}" \
          --project="${PROJECT_ID}" >/dev/null 2>&1; then
          echo "ERROR: No se pudo acceder al repositorio Artifact Registry '${_REPOSITORY}' en región '${_REGION}' del proyecto '${PROJECT_ID}'."
          echo "       Verifica existencia del repositorio y permisos (artifactregistry.repositories.get / downloadArtifacts)."
          exit 1
        fi
        echo "[preflight] OK: repositorio Artifact Registry accesible."

        required_project_perms="run.services.create,run.services.update,run.services.get,iam.serviceAccounts.actAs"
        granted_project_perms="$(gcloud projects test-iam-permissions "${PROJECT_ID}" \
          --permissions="${required_project_perms}" \
          --format='value(permissions)' || true)"
        granted_project_perms="$(printf '%s' "${granted_project_perms}" | tr ';' '\n' | sed '/^$/d')"

        missing_project_perms=()
        IFS=',' read -r -a project_perms <<< "${required_project_perms}"
        for perm in "${project_perms[@]}"; do
          if ! printf '%s\n' "${granted_project_perms}" | grep -qx "${perm}"; then
            missing_project_perms+=("${perm}")
          fi
        done

        if [ ${#missing_project_perms[@]} -gt 0 ]; then
          echo "ERROR: Permisos insuficientes para ejecutar 'gcloud run deploy' con la identidad actual (${cb_sa})."
          echo "       Faltan permisos en proyecto: ${missing_project_perms[*]}"
          echo "       Roles mínimos sugeridos: roles/run.admin + roles/iam.serviceAccountUser (sobre la runtime service account)."
          exit 1
        fi
        echo "[preflight] OK: permisos mínimos de deploy Cloud Run presentes."

        repo_resource="projects/${PROJECT_ID}/locations/${_REGION}/repositories/${_REPOSITORY}"
        required_repo_perm="artifactregistry.repositories.downloadArtifacts"
        if ! gcloud artifacts repositories test-iam-permissions "${_REPOSITORY}" \
          --location="${_REGION}" \
          --project="${PROJECT_ID}" \
          --permissions="${required_repo_perm}" \
          --format='value(permissions)' | grep -qx "${required_repo_perm}"; then
          echo "ERROR: Falta permiso '${required_repo_perm}' sobre '${repo_resource}'."
          echo "       Asigna al Cloud Build SA un rol como roles/artifactregistry.reader en el repositorio o proyecto."
          exit 1
        fi
        echo "[preflight] OK: permisos mínimos sobre Artifact Registry presentes."

        echo "[preflight] Nota: este pipeline usa --no-allow-unauthenticated; no aplica cambio de IAM público (run.services.setIamPolicy)."
        echo "[preflight] Si habilitas invocación pública en otro entorno, valida además run.services.setIamPolicy antes del deploy."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-f"
      - "simple/Dockerfile"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BUGSNAG_SERVICE}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_JIRA_SERVICE}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TESTRAIL_SERVICE}:${_IMAGE_TAG}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_GAMEBENCH_SERVICE}:${_IMAGE_TAG}"
      - "."

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_BUGSNAG_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BUGSNAG_SERVICE}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--set-env-vars=BQ_PROJECT=${_BQ_PROJECT},BQ_DATASET=${_BQ_DATASET},BQ_LOCATION=${_BQ_LOCATION}"
      - "--command=sh"
      - "--args=-c,functions-framework --target=hello_http --source=bugsnag/main.py --port=$$PORT"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_JIRA_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_JIRA_SERVICE}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--set-env-vars=BQ_PROJECT=${_BQ_PROJECT},BQ_DATASET=${_BQ_DATASET},BQ_LOCATION=${_BQ_LOCATION}"
      - "--command=sh"
      - "--args=-c,functions-framework --target=hello_http --source=jira/main.py --port=$$PORT"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_TESTRAIL_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TESTRAIL_SERVICE}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--set-env-vars=BQ_PROJECT=${_BQ_PROJECT},BQ_DATASET=${_BQ_DATASET},BQ_LOCATION=${_BQ_LOCATION}"
      - "--command=sh"
      - "--args=-c,functions-framework --target=hello_http --source=testrail/main.py --port=$$PORT"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_GAMEBENCH_SERVICE}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_GAMEBENCH_SERVICE}:${_IMAGE_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--no-allow-unauthenticated"
      - "--set-env-vars=BQ_PROJECT=${_BQ_PROJECT},BQ_DATASET=${_BQ_DATASET},BQ_LOCATION=${_BQ_LOCATION}"
      - "--command=sh"
      - "--args=-c,functions-framework --target=hello_http --source=gamebench/main.py --port=$$PORT"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_BUGSNAG_SERVICE}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_JIRA_SERVICE}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_TESTRAIL_SERVICE}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/${_GAMEBENCH_SERVICE}:${_IMAGE_TAG}"

options:
  logging: LEGACY
  # Allow literal runtime env placeholders (for example, ${TOKEN} in helper commands)
  # without failing Cloud Build template validation.
  substitution_option: ALLOW_LOOSE
